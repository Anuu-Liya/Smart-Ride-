version: 1.0.0+1

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  mobile_scanner: ^5.2.0  # Fix
  fl_chart: ^0.70.0       # Fix
  cloud_firestore: ^5.0.2 #
  firebase_auth: ^5.1.1
  qr_flutter: ^4.1.0
  google_generative_ai: ^0.4.0
  flutter_map: ^8.2.2
  latlong2: ^0.9.1



